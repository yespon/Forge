apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
  namespace: forge
data:
  LOG_LEVEL: "info"
  DATABASE_URL: "postgresql+asyncpg://forge:$(POSTGRES_PASSWORD)@postgres:5432/forge"
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis:6379/0"
---
apiVersion: v1
kind: Secret
metadata:
  name: forge-secrets
  namespace: forge
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
  POSTGRES_PASSWORD: "forge_secret"
  REDIS_PASSWORD: "forge_redis"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
